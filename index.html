<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Две кнопки</title>
    <style>
        /* ── Сброс и базовые стили ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #0d0f1a 0%, #1a1f2f 100%);
            padding: 1.5rem;
        }

        /* ── Карточка ── */
        .card {
            max-width: 640px;
            width: 100%;
            padding: 3rem 2.5rem;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.8),
            inset 0 1px 0 rgba(255, 255, 255, 0.04);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        /* ── Заголовок ── */
        .card h1 {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f0f2ff 0%, #b7c9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .card p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.05rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            margin-bottom: 2.8rem;
        }

        /* ── Контейнер кнопок ── */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            justify-content: center;
        }

        /* ── Общие стили кнопок ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 1rem 2.6rem;
            min-width: 180px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.01em;
        }

        /* ── Кнопка 1 — градиентная ── */
        .btn-primary {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: #fff;
            box-shadow: 0 8px 24px -6px rgba(110, 142, 251, 0.35);
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            background: linear-gradient(135deg, #a777e3, #6e8efb);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-primary:hover::after {
            opacity: 1;
        }

        .btn-primary:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 16px 40px -8px rgba(110, 142, 251, 0.5);
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        /* ── Кнопка 2 — обводка ── */
        .btn-secondary {
            background: transparent;
            color: #c8d6ff;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .btn-secondary::before {
            content: '';
            position: absolute;
            inset: -1.5px;
            border-radius: 60px;
            padding: 1.5px;
            background: linear-gradient(135deg, rgba(110, 142, 251, 0.4), rgba(167, 119, 227, 0.4));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .btn-secondary:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 32px -12px rgba(110, 142, 251, 0.25);
            background: rgba(255, 255, 255, 0.04);
        }

        .btn-secondary:hover::before {
            opacity: 1;
        }

        .btn-secondary:active {
            transform: scale(0.96);
        }

        /* ── Иконки (SVG) ── */
        .btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .btn:hover svg {
            transform: translateX(4px) scale(1.05);
        }

        .btn-secondary:hover svg {
            transform: translateX(4px) scale(1.05);
        }

        /* ── Адаптивность ── */
        @media (max-width: 480px) {
            .card {
                padding: 2.2rem 1.5rem;
                border-radius: 2rem;
            }

            .card h1 {
                font-size: 2rem;
            }

            .card p {
                font-size: 0.95rem;
                margin-bottom: 2rem;
            }

            .btn {
                min-width: 140px;
                padding: 0.85rem 1.8rem;
                font-size: 1rem;
                width: 100%;
            }

            .button-group {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }
        }

        @media (max-width: 380px) {
            .card h1 {
                font-size: 1.6rem;
            }

            .btn {
                font-size: 0.9rem;
                padding: 0.75rem 1.4rem;
            }
        }

        /* ── Анимация появления ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: fadeUp 0.8s ease both;
        }

        .btn-primary {
            animation: fadeUp 0.8s ease 0.15s both;
        }

        .btn-secondary {
            animation: fadeUp 0.8s ease 0.3s both;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Привет, мир</h1>
    <p>Выбери свой путь</p>

    <div class="button-group">

        <!-- Кнопка 1 -->
        <a href="#" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                <path d="M2 17l10 5 10-5" />
                <path d="M2 12l10 5 10-5" />
            </svg>
            Начать
        </a>

        <!-- Кнопка 2 -->
        <a href="#" class="btn btn-secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 8v8" />
                <path d="M8 12h8" />
            </svg>
            Подробнее
        </a>

    </div>
</div>

</body>
</html>
